name: fork-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update. Also sets the Cargo version, after stripping v/rust-v prefixes."
        required: true
        type: string
      ref:
        description: "Branch, tag, or SHA to release."
        required: true
        default: "codex/fork-release"
        type: string
      release_name:
        description: "GitHub Release title. Defaults to the release tag."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: true
        default: true
        type: boolean
      draft:
        description: "Create or keep the GitHub Release as a draft."
        required: true
        default: false
        type: boolean
      release_notes:
        description: "Optional release notes. Defaults to the released commit message."
        required: false
        type: string

# Cargo's libgit2 transport has been flaky when fetching git dependencies with
# nested submodules. Prefer the system git CLI across every Cargo invocation.
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CODEX_APP_MANIFEST_URL: "https://codexapp.agentsmirror.com/latest/manifest"
  CODEX_APP_WINDOWS_ARM64_URL: "https://codexapp.agentsmirror.com/latest/win-arm64"
  CODEX_APP_WINDOWS_X64_URL: "https://codexapp.agentsmirror.com/latest/win-x64"
  GIT_FOR_WINDOWS_RELEASE_TAG: "v2.55.0.windows.2"
  WINDOWS_BINARIES: "codex codex-code-mode-host codex-responses-api-proxy codex-windows-sandbox-setup codex-command-runner codex-app-server"

concurrency:
  group: fork-release-${{ inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      ref_sha: ${{ steps.metadata.outputs.ref_sha }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      release_version: ${{ steps.metadata.outputs.release_version }}
      codex_app_x64_downloadable: ${{ steps.codex_app_metadata.outputs.x64_downloadable }}
      codex_app_x64_version: ${{ steps.codex_app_metadata.outputs.x64_app_version }}
      codex_app_x64_package_version: ${{ steps.codex_app_metadata.outputs.x64_package_version }}
      codex_app_x64_sha256_base64: ${{ steps.codex_app_metadata.outputs.x64_sha256_base64 }}
      codex_app_arm64_downloadable: ${{ steps.codex_app_metadata.outputs.arm64_downloadable }}
      codex_app_arm64_version: ${{ steps.codex_app_metadata.outputs.arm64_app_version }}
      codex_app_arm64_package_version: ${{ steps.codex_app_metadata.outputs.arm64_package_version }}
      codex_app_arm64_sha256_base64: ${{ steps.codex_app_metadata.outputs.arm64_sha256_base64 }}
      codex_app_matrix: ${{ steps.codex_app_metadata.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release metadata
        id: metadata
        shell: bash
        env:
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "release_tag is required." >&2
            exit 1
          fi

          git check-ref-format "refs/tags/${RELEASE_TAG}"

          ref_sha="$(git rev-parse HEAD)"
          release_version="${RELEASE_TAG#rust-v}"
          release_version="${release_version#v}"
          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "release_tag must resolve to a Cargo-compatible SemVer version. Got: ${RELEASE_TAG}" >&2
            echo "Use a tag like 0.143.0-alpha.35-gitbash, v0.143.0, or rust-v0.143.0." >&2
            exit 1
          fi

          if [[ -z "${RELEASE_NAME}" ]]; then
            RELEASE_NAME="${RELEASE_TAG}"
          fi

          {
            echo "ref_sha=${ref_sha}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_version=${release_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Codex App metadata
        id: codex_app_metadata
        shell: bash
        run: |
          set -euo pipefail

          manifest_path="${RUNNER_TEMP}/codex-app-release-manifest.json"
          curl --fail --location --retry 3 --retry-all-errors \
            --output "${manifest_path}" \
            "${CODEX_APP_MANIFEST_URL}"

          x64_downloadable="$(jq -r '.sources.windows.architectures.x64.downloadable // false' "${manifest_path}")"
          x64_app_version="$(jq -r '.sources.windows.architectures.x64.appVersion // empty' "${manifest_path}")"
          x64_package_version="$(jq -r '.sources.windows.architectures.x64.version // empty' "${manifest_path}")"
          x64_sha256_base64="$(jq -r '.sources.windows.architectures.x64.catalog.hash // empty' "${manifest_path}")"
          arm64_downloadable="$(jq -r '.sources.windows.architectures.arm64.downloadable // false' "${manifest_path}")"
          arm64_app_version="$(jq -r '.sources.windows.architectures.arm64.appVersion // empty' "${manifest_path}")"
          arm64_package_version="$(jq -r '.sources.windows.architectures.arm64.version // empty' "${manifest_path}")"
          arm64_sha256_base64="$(jq -r '.sources.windows.architectures.arm64.catalog.hash // empty' "${manifest_path}")"

          if [[ "${x64_downloadable}" != "true" || -z "${x64_app_version}" || -z "${x64_package_version}" || -z "${x64_sha256_base64}" ]]; then
            echo "The latest Codex App manifest does not contain complete Windows x64 package metadata." >&2
            exit 1
          fi
          if [[ "${arm64_downloadable}" == "true" && ( -z "${arm64_app_version}" || -z "${arm64_package_version}" || -z "${arm64_sha256_base64}" ) ]]; then
            echo "The latest Codex App manifest marks Windows ARM64 downloadable but does not provide complete package metadata." >&2
            exit 1
          fi

          matrix='{"include":[{"target":"x86_64-pc-windows-msvc"}]}'
          if [[ "${arm64_downloadable}" == "true" ]]; then
            matrix='{"include":[{"target":"x86_64-pc-windows-msvc"},{"target":"aarch64-pc-windows-msvc"}]}'
          fi

          {
            echo "x64_downloadable=${x64_downloadable}"
            echo "x64_app_version=${x64_app_version}"
            echo "x64_package_version=${x64_package_version}"
            echo "x64_sha256_base64=${x64_sha256_base64}"
            echo "arm64_downloadable=${arm64_downloadable}"
            echo "arm64_app_version=${arm64_app_version}"
            echo "arm64_package_version=${arm64_package_version}"
            echo "arm64_sha256_base64=${arm64_sha256_base64}"
            echo "matrix=${matrix}"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows ${{ matrix.target }}
    needs: metadata
    runs-on: windows-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.metadata.outputs.ref_sha }}
          persist-credentials: false

      - name: Print runner specs
        shell: pwsh
        run: |
          $computer = Get-CimInstance Win32_ComputerSystem
          $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1
          $ramGiB = [math]::Round($computer.TotalPhysicalMemory / 1GB, 1)
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"
          Write-Host "CPU: $($cpu.Name)"
          Write-Host "Logical CPUs: $($computer.NumberOfLogicalProcessors)"
          Write-Host "Physical CPUs: $($computer.NumberOfProcessors)"
          Write-Host "Total RAM: $ramGiB GiB"
          Write-Host "Disk usage:"
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize Name, @{Name='Size(GB)';Expression={[math]::Round(($_.Used + $_.Free) / 1GB, 1)}}, @{Name='Free(GB)';Expression={[math]::Round($_.Free / 1GB, 1)}}

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Configure MSVC environment
        uses: ./.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.target }}

      - name: Set Cargo release version
        shell: pwsh
        run: |
          $version = "${{ needs.metadata.outputs.release_version }}"
          $cargoToml = "Cargo.toml"
          $lines = @(Get-Content -LiteralPath $cargoToml)
          $inWorkspacePackage = $false
          $updated = $false

          for ($i = 0; $i -lt $lines.Count; $i++) {
            $trimmed = $lines[$i].Trim()
            if ($trimmed -eq "[workspace.package]") {
              $inWorkspacePackage = $true
              continue
            }

            if ($inWorkspacePackage -and $trimmed.StartsWith("[")) {
              break
            }

            if ($inWorkspacePackage -and $lines[$i] -match '^\s*version\s*=') {
              $lines[$i] = "version = `"$version`""
              $updated = $true
              break
            }
          }

          if (-not $updated) {
            throw "Could not find [workspace.package].version in $cargoToml"
          }

          Set-Content -LiteralPath $cargoToml -Value $lines -Encoding utf8
          Write-Host "Set [workspace.package].version to $version"

      - name: Cargo build Windows binaries
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          if ($target -eq "x86_64-pc-windows-msvc") {
            $env:LIBSQLITE3_FLAGS = "SQLITE_DISABLE_INTRINSIC"
          }

          $binaries = $env:WINDOWS_BINARIES -split " "
          $buildArgs = @("build", "--target", $target, "--release", "--timings")
          foreach ($binary in $binaries) {
            $buildArgs += @("--bin", $binary)
          }

          cargo @buildArgs

      - name: Upload Cargo timings
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-timings-fork-release-${{ matrix.target }}
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $releaseDir = Join-Path -Path (Join-Path -Path "target" -ChildPath $target) -ChildPath "release"
          $distDir = Join-Path -Path "dist" -ChildPath $target
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          $binaries = $env:WINDOWS_BINARIES -split " "
          foreach ($binary in $binaries) {
            $exePath = Join-Path -Path $releaseDir -ChildPath "$binary.exe"
            if (-not (Test-Path -LiteralPath $exePath)) {
              throw "Expected binary not found: $exePath"
            }

            Copy-Item -LiteralPath $exePath -Destination (Join-Path -Path $distDir -ChildPath "$binary-$target.exe") -Force

            $pdbStem = $binary.Replace("-", "_")
            $pdbCandidates = @(
              (Join-Path -Path $releaseDir -ChildPath "$pdbStem.pdb"),
              (Join-Path -Path $releaseDir -ChildPath "$binary.pdb")
            )
            $pdbPath = $pdbCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
            if ($pdbPath) {
              Copy-Item -LiteralPath $pdbPath -Destination (Join-Path -Path $distDir -ChildPath "$binary-$target.pdb") -Force
            }
          }

          $archivePath = Join-Path -Path "dist" -ChildPath "codex-windows-$target.zip"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          Compress-Archive -Path (Join-Path -Path $distDir -ChildPath "*") -DestinationPath $archivePath -Force

          Get-ChildItem -Path "dist" -Recurse | Select-Object FullName, Length

      - name: Build portable Windows package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $target = "${{ matrix.target }}"
          $releaseDir = Join-Path -Path (Join-Path -Path "target" -ChildPath $target) -ChildPath "release"
          $distRoot = Join-Path -Path (Get-Location) -ChildPath "dist"
          $packageDir = Join-Path -Path $distRoot -ChildPath "portable-$target"
          $portableArchivePath = Join-Path -Path $distRoot -ChildPath "codex-portable-windows-$target.zip"

          function Get-SevenZip {
            $command = Get-Command 7z -ErrorAction SilentlyContinue
            if ($command) {
              return $command.Source
            }

            $defaultPath = Join-Path -Path ${env:ProgramFiles} -ChildPath "7-Zip\7z.exe"
            if (Test-Path -LiteralPath $defaultPath) {
              return $defaultPath
            }

            throw "7-Zip was not found on PATH or at $defaultPath"
          }

          python ..\scripts\build_codex_package.py `
            --target $target `
            --variant codex `
            --cargo-profile release `
            --package-dir $packageDir `
            --force `
            --entrypoint-bin (Join-Path -Path $releaseDir -ChildPath "codex.exe") `
            --code-mode-host-bin (Join-Path -Path $releaseDir -ChildPath "codex-code-mode-host.exe") `
            --codex-command-runner-bin (Join-Path -Path $releaseDir -ChildPath "codex-command-runner.exe") `
            --codex-windows-sandbox-setup-bin (Join-Path -Path $releaseDir -ChildPath "codex-windows-sandbox-setup.exe")

          $sevenZip = Get-SevenZip
          $gitAssetPattern = switch ($target) {
            "x86_64-pc-windows-msvc" { "PortableGit-*-64-bit.7z.exe"; break }
            "aarch64-pc-windows-msvc" { "PortableGit-*-arm64.7z.exe"; break }
            default { throw "No PortableGit asset pattern for target: $target" }
          }
          $gitDownloadDir = Join-Path -Path $env:RUNNER_TEMP -ChildPath "portable-git-$target"
          $gitDir = Join-Path -Path $packageDir -ChildPath "git"
          New-Item -ItemType Directory -Path $gitDownloadDir -Force | Out-Null
          New-Item -ItemType Directory -Path $gitDir -Force | Out-Null

          gh release download $env:GIT_FOR_WINDOWS_RELEASE_TAG `
            --repo git-for-windows/git `
            --pattern $gitAssetPattern `
            --dir $gitDownloadDir `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download $gitAssetPattern from git-for-windows/git $env:GIT_FOR_WINDOWS_RELEASE_TAG"
          }

          $gitAssets = @(Get-ChildItem -LiteralPath $gitDownloadDir -Filter "PortableGit-*.7z.exe")
          if ($gitAssets.Count -ne 1) {
            throw "Expected exactly one PortableGit asset in $gitDownloadDir, found $($gitAssets.Count)"
          }

          & $sevenZip x $gitAssets[0].FullName "-o$gitDir" -y
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract $($gitAssets[0].FullName)"
          }

          foreach ($relativePath in @("cmd\git.exe", "bin\bash.exe", "usr\bin\bash.exe", "usr\bin\msys-2.0.dll")) {
            $path = Join-Path -Path $gitDir -ChildPath $relativePath
            if (-not (Test-Path -LiteralPath $path)) {
              throw "PortableGit extraction is missing $relativePath"
            }
          }

          @'
          @echo off
          set "CODEX_PORTABLE_ROOT=%~dp0"
          set "PATH=%CODEX_PORTABLE_ROOT%git\cmd;%CODEX_PORTABLE_ROOT%git\bin;%PATH%"
          "%CODEX_PORTABLE_ROOT%bin\codex.exe" %*
          exit /b %ERRORLEVEL%
          '@ | Set-Content -LiteralPath (Join-Path -Path $packageDir -ChildPath "codex.cmd") -Encoding ascii

          @'
          Portable Codex for Windows

          Add this extracted directory to PATH, then run:

            codex --version

          This archive includes Portable Git for Windows under git\. When Codex
          starts through codex.cmd, the launcher prepends the bundled git\cmd and
          git\bin directories to PATH so Codex can find Git Bash.

          Git Bash is Codex's default Windows shell in this fork.

          You can also add the bin directory to PATH and run codex.exe directly.
          In that case, add git\cmd to PATH yourself or set windows.git_bash_path
          to the extracted git\bin\bash.exe path.
          '@ | Set-Content -LiteralPath (Join-Path -Path $packageDir -ChildPath "PORTABLE-INSTALL.txt") -Encoding utf8

          if (Test-Path -LiteralPath $portableArchivePath) {
            Remove-Item -LiteralPath $portableArchivePath -Force
          }
          Push-Location $packageDir
          try {
            & $sevenZip a -tzip $portableArchivePath ".\*"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create $portableArchivePath"
            }
          } finally {
            Pop-Location
          }

          $packageFiles = @(Get-ChildItem -Path $packageDir -Recurse -File)
          $packageSizeMiB = [math]::Round((($packageFiles | Measure-Object -Property Length -Sum).Sum) / 1MB, 1)
          Write-Host "Portable package files: $($packageFiles.Count); unpacked size: $packageSizeMiB MiB"
          Get-ChildItem -Path $packageDir | Select-Object FullName, Length
          Get-Item -LiteralPath $portableArchivePath | Select-Object FullName, Length

      - name: Upload Windows release archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fork-release-windows-${{ matrix.target }}
          path: |
            codex-rs/dist/codex-windows-${{ matrix.target }}.zip
            codex-rs/dist/codex-portable-windows-${{ matrix.target }}.zip
          if-no-files-found: error

  build-codex-app:
    name: Build portable Codex App ${{ matrix.target }}
    needs:
      - metadata
      - build-windows
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.metadata.outputs.codex_app_matrix) }}
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.metadata.outputs.ref_sha }}
          persist-credentials: false

      - name: Download portable CLI package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fork-release-windows-${{ matrix.target }}
          path: ${{ runner.temp }}/codex-app-input-${{ matrix.target }}

      - name: Extract portable CLI package
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $artifactDir = Join-Path -Path $env:RUNNER_TEMP -ChildPath "codex-app-input-$target"
          $cliArchive = Join-Path -Path $artifactDir -ChildPath "codex-portable-windows-$target.zip"
          $cliPortablePackageDir = Join-Path -Path $env:RUNNER_TEMP -ChildPath "codex-cli-portable-$target"

          if (-not (Test-Path -LiteralPath $cliArchive)) {
            throw "Downloaded build artifact is missing $cliArchive"
          }
          New-Item -ItemType Directory -Path $cliPortablePackageDir -Force | Out-Null
          & 7z x $cliArchive "-o$cliPortablePackageDir" -y
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract $cliArchive"
          }

          $artifactRoot = [IO.Path]::GetFullPath($env:RUNNER_TEMP).TrimEnd([IO.Path]::DirectorySeparatorChar)
          $artifactPath = [IO.Path]::GetFullPath($artifactDir)
          if (-not $artifactPath.StartsWith("$artifactRoot$([IO.Path]::DirectorySeparatorChar)", [StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to remove artifact directory outside $artifactRoot`: $artifactPath"
          }
          Remove-Item -LiteralPath $artifactDir -Recurse -Force

      - name: Build portable Codex App package
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $cliPortablePackageDir = Join-Path -Path $env:RUNNER_TEMP -ChildPath "codex-cli-portable-$target"

          if ($target -eq "x86_64-pc-windows-msvc") {
            $sourceUrl = $env:CODEX_APP_WINDOWS_X64_URL
            $expectedSha256Base64 = "${{ needs.metadata.outputs.codex_app_x64_sha256_base64 }}"
            $baseAppVersion = "${{ needs.metadata.outputs.codex_app_x64_version }}"
            $basePackageVersion = "${{ needs.metadata.outputs.codex_app_x64_package_version }}"
          } elseif ($target -eq "aarch64-pc-windows-msvc") {
            $sourceUrl = $env:CODEX_APP_WINDOWS_ARM64_URL
            $expectedSha256Base64 = "${{ needs.metadata.outputs.codex_app_arm64_sha256_base64 }}"
            $baseAppVersion = "${{ needs.metadata.outputs.codex_app_arm64_version }}"
            $basePackageVersion = "${{ needs.metadata.outputs.codex_app_arm64_package_version }}"
          } else {
            throw "Unsupported Codex App target: $target"
          }

          & ..\.github\scripts\build-codex-app-portable.ps1 `
            -Target $target `
            -CodexPackageDir $cliPortablePackageDir `
            -DistRoot (Join-Path -Path (Get-Location) -ChildPath "dist") `
            -SourceUrl $sourceUrl `
            -ExpectedSha256Base64 $expectedSha256Base64 `
            -BaseAppVersion $baseAppVersion `
            -BasePackageVersion $basePackageVersion `
            -ForkReleaseTag "${{ needs.metadata.outputs.release_tag }}" `
            -SourceRef "${{ needs.metadata.outputs.ref_sha }}"

      - name: Upload portable Codex App archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fork-release-codex-app-${{ matrix.target }}
          path: codex-rs/dist/codex-app-portable-windows-${{ matrix.target }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - metadata
      - build-windows
      - build-codex-app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.metadata.outputs.ref_sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: fork-release-*
          path: release-artifacts
          merge-multiple: true

      - name: Create checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Ensure release tag points at selected ref
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          TARGET_SHA: ${{ needs.metadata.outputs.ref_sha }}
        run: |
          set -euo pipefail

          git fetch origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" || true
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${existing_sha}" != "${TARGET_SHA}" ]]; then
              echo "Tag ${RELEASE_TAG} already points at ${existing_sha}, not ${TARGET_SHA}." >&2
              echo "Refusing to move an existing release tag." >&2
              exit 1
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${TARGET_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Write release notes
        shell: bash
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
          TARGET_SHA: ${{ needs.metadata.outputs.ref_sha }}
        run: |
          set -euo pipefail
          notes_path="${RUNNER_TEMP}/release-notes.md"
          if [[ -n "${RELEASE_NOTES}" ]]; then
            printf '%s\n' "${RELEASE_NOTES}" > "${notes_path}"
          else
            git log -1 --format='%s%n%n%b' "${TARGET_SHA}" > "${notes_path}"
          fi
          echo "RELEASE_NOTES_PATH=${notes_path}" >> "$GITHUB_ENV"

      - name: Create or update GitHub Release
        shell: bash
        env:
          DRAFT: ${{ inputs.draft }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          TARGET_SHA: ${{ needs.metadata.outputs.ref_sha }}
        run: |
          set -euo pipefail

          create_args=(
            "${RELEASE_TAG}"
            --verify-tag
            --target "${TARGET_SHA}"
            --title "${RELEASE_NAME}"
            --notes-file "${RELEASE_NOTES_PATH}"
          )
          if [[ "${DRAFT}" == "true" ]]; then
            create_args+=(--draft)
          fi
          if [[ "${PRERELEASE}" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --target "${TARGET_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file "${RELEASE_NOTES_PATH}" \
              --draft="${DRAFT}" \
              --prerelease="${PRERELEASE}"
          else
            gh release create "${create_args[@]}"
          fi

          mapfile -t assets < <(find release-artifacts -maxdepth 1 -type f \( -name 'codex-*.zip' -o -name 'SHA256SUMS.txt' \) | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
