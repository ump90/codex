name: sync-upstream

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: "Repository to sync from."
        required: true
        default: "openai/codex"
      upstream_branch:
        description: "Branch to sync from."
        required: true
        default: "main"
      target_branch:
        description: "Branch to update in this repository."
        required: true
        default: "codex/fork-release"
  schedule:
    # Daily at 04:00 Asia/Shanghai.
    - cron: "0 20 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target_branch || 'codex/fork-release' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    name: Merge upstream into ${{ inputs.target_branch || 'codex/fork-release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_branch || 'codex/fork-release' }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream branch
        env:
          UPSTREAM_REPOSITORY: ${{ inputs.upstream_repository || 'openai/codex' }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch || 'main' }}
          TARGET_BRANCH: ${{ inputs.target_branch || 'codex/fork-release' }}
        run: |
          set -euo pipefail

          git fetch origin "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"

          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" HEAD; then
            echo "${TARGET_BRANCH} already contains upstream/${UPSTREAM_BRANCH}."
            exit 0
          fi

          git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
